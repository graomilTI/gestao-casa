<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro · Gestão de Casa</title>
  <meta name="theme-color" content="#0e1016" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gestão de Casa" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">🏡 Gestão de Casa</div>
      <div class="household-name" id="household-name">Carregando…</div>
      <nav id="sidebar-nav"></nav>
      <div class="spacer"></div>
      <button class="btn-logout" id="btn-logout">↪ Sair</button>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1>Controle financeiro</h1>
          <p>Receitas e despesas da casa, organizadas por categoria.</p>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn secondary" id="btn-new-category">+ Categoria</button>
          <button class="btn" id="btn-new-transaction">+ Lançamento</button>
        </div>
      </div>

      <div class="grid cols-3" style="margin-bottom: 20px;">
        <div class="card stat-card positive">
          <div class="label">Receitas no mês</div>
          <div class="value" id="stat-receitas">—</div>
        </div>
        <div class="card stat-card negative">
          <div class="label">Despesas no mês</div>
          <div class="value" id="stat-despesas">—</div>
        </div>
        <div class="card stat-card" id="stat-saldo-card">
          <div class="label">Saldo do mês</div>
          <div class="value" id="stat-saldo">—</div>
        </div>
      </div>

      <div class="card">
        <div class="row" style="margin-bottom: 16px; align-items: flex-end;">
          <div class="form-group" style="margin-bottom:0;">
            <label for="filter-month">Mês</label>
            <input type="month" id="filter-month" />
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label for="filter-type">Tipo</label>
            <select id="filter-type">
              <option value="">Todos</option>
              <option value="receita">Receitas</option>
              <option value="despesa">Despesas</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label for="filter-category">Categoria</label>
            <select id="filter-category">
              <option value="">Todas</option>
            </select>
          </div>
        </div>

        <div id="transactions-table"><div class="empty-state">Carregando…</div></div>
      </div>
    </main>
  </div>

  <!-- Modal: novo/editar lançamento -->
  <div class="modal-overlay hidden" id="modal-transaction">
    <div class="modal">
      <h2 id="transaction-modal-title">Novo lançamento</h2>
      <div id="transaction-modal-alert"></div>
      <form id="transaction-form">
        <input type="hidden" id="transaction-id" />
        <div class="form-group">
          <label for="transaction-description">Descrição</label>
          <input type="text" id="transaction-description" required placeholder="Ex.: Supermercado" />
        </div>
        <div class="row">
          <div class="form-group">
            <label for="transaction-type">Tipo</label>
            <select id="transaction-type" required>
              <option value="despesa">Despesa</option>
              <option value="receita">Receita</option>
            </select>
          </div>
          <div class="form-group">
            <label for="transaction-amount">Valor (R$)</label>
            <input type="number" id="transaction-amount" required min="0.01" step="0.01" placeholder="0,00" />
          </div>
        </div>
        <div class="row">
          <div class="form-group">
            <label for="transaction-category">Categoria</label>
            <select id="transaction-category">
              <option value="">Sem categoria</option>
            </select>
          </div>
          <div class="form-group">
            <label for="transaction-date">Data</label>
            <input type="date" id="transaction-date" required />
          </div>
        </div>
        <div class="form-group">
          <label for="transaction-notes">Observações</label>
          <textarea id="transaction-notes" placeholder="Opcional"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn secondary" id="btn-cancel-transaction">Cancelar</button>
          <button type="submit" class="btn" id="btn-save-transaction">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: nova categoria -->
  <div class="modal-overlay hidden" id="modal-category">
    <div class="modal">
      <h2>Nova categoria</h2>
      <div id="category-modal-alert"></div>
      <form id="category-form">
        <div class="form-group">
          <label for="category-name">Nome</label>
          <input type="text" id="category-name" required placeholder="Ex.: Mercado, Aluguel, Salário" />
        </div>
        <div class="row">
          <div class="form-group">
            <label for="category-type">Tipo</label>
            <select id="category-type" required>
              <option value="despesa">Despesa</option>
              <option value="receita">Receita</option>
            </select>
          </div>
          <div class="form-group">
            <label for="category-color">Cor</label>
            <input type="color" id="category-color" value="#6366f1" />
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn secondary" id="btn-cancel-category">Cancelar</button>
          <button type="submit" class="btn">Salvar categoria</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/financeiro.js"></script>
</body>
</html>
