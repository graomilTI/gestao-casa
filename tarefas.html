<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarefas · Gestão de Casa</title>
  <meta name="theme-color" content="#0e1016" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gestão de Casa" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">🏡 Gestão de Casa</div>
      <div class="household-name" id="household-name">Carregando…</div>
      <nav id="sidebar-nav"></nav>
      <div class="spacer"></div>
      <button class="btn-logout" id="btn-logout">↪ Sair</button>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1>Divisão de tarefas</h1>
          <p>Organize as tarefas da casa entre os moradores.</p>
        </div>
        <div class="row" style="flex:none; gap:10px;">
          <select id="filter-member" style="min-width: 180px;">
            <option value="">Todos os responsáveis</option>
          </select>
          <button class="btn" id="btn-new-task">+ Nova tarefa</button>
        </div>
      </div>

      <div class="kanban">
        <div class="kanban-column">
          <h3>Pendentes <span class="count" id="count-pendente">0</span></h3>
          <div id="column-pendente"></div>
        </div>
        <div class="kanban-column">
          <h3>Em andamento <span class="count" id="count-em_andamento">0</span></h3>
          <div id="column-em_andamento"></div>
        </div>
        <div class="kanban-column">
          <h3>Concluídas <span class="count" id="count-concluida">0</span></h3>
          <div id="column-concluida"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal: nova/editar tarefa -->
  <div class="modal-overlay hidden" id="modal-task">
    <div class="modal">
      <h2 id="task-modal-title">Nova tarefa</h2>
      <div id="task-modal-alert"></div>
      <form id="task-form">
        <input type="hidden" id="task-id" />
        <div class="form-group">
          <label for="task-title">Título</label>
          <input type="text" id="task-title" required placeholder="Ex.: Lavar roupa" />
        </div>
        <div class="form-group">
          <label for="task-description">Descrição</label>
          <textarea id="task-description" placeholder="Opcional"></textarea>
        </div>
        <div class="row">
          <div class="form-group">
            <label for="task-assigned">Responsável</label>
            <select id="task-assigned">
              <option value="">Sem responsável</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-priority">Prioridade</label>
            <select id="task-priority">
              <option value="baixa">Baixa</option>
              <option value="normal" selected>Normal</option>
              <option value="alta">Alta</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="form-group">
            <label for="task-due-date">Prazo</label>
            <input type="date" id="task-due-date" />
          </div>
          <div class="form-group">
            <label for="task-recurrence">Recorrência</label>
            <select id="task-recurrence">
              <option value="nenhuma">Não repete</option>
              <option value="diaria">Diária</option>
              <option value="semanal">Semanal</option>
              <option value="mensal">Mensal</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn danger hidden" id="btn-delete-task">Excluir</button>
          <button type="button" class="btn secondary" id="btn-cancel-task">Cancelar</button>
          <button type="submit" class="btn" id="btn-save-task">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/notifications.js"></script>
  <script src="assets/js/tarefas.js"></script>
</body>
</html>
