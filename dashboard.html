<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Início · Gestão de Casa</title>
  <meta name="theme-color" content="#0e1016" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gestão de Casa" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">🏡 Gestão de Casa</div>
      <div class="household-name" id="household-name">Carregando…</div>
      <nav id="sidebar-nav"></nav>
      <div class="spacer"></div>
      <button class="btn-logout" id="btn-logout">↪ Sair</button>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1 id="greeting">Olá!</h1>
          <p id="today-label"></p>
        </div>
      </div>

      <div class="grid cols-3" style="margin-bottom: 22px;">
        <div class="card stat-card positive">
          <div class="label">Receitas no mês</div>
          <div class="value" id="stat-receitas">—</div>
        </div>
        <div class="card stat-card negative">
          <div class="label">Despesas no mês</div>
          <div class="value" id="stat-despesas">—</div>
        </div>
        <div class="card stat-card" id="stat-saldo-card">
          <div class="label">Saldo do mês</div>
          <div class="value" id="stat-saldo">—</div>
        </div>
      </div>

      <div class="grid cols-2">
        <div class="card">
          <div class="page-header" style="margin-bottom: 12px;">
            <h2 style="margin:0; font-size:1.05rem;">Próximos eventos</h2>
            <a href="agenda.html" class="btn secondary small">Ver agenda</a>
          </div>
          <div id="upcoming-events"><div class="empty-state">Carregando…</div></div>
        </div>

        <div class="card">
          <div class="page-header" style="margin-bottom: 12px;">
            <h2 style="margin:0; font-size:1.05rem;">Tarefas pendentes</h2>
            <a href="tarefas.html" class="btn secondary small">Ver tarefas</a>
          </div>
          <div id="pending-tasks"><div class="empty-state">Carregando…</div></div>
        </div>
      </div>

      <div class="card" style="margin-top: 18px;">
        <div class="page-header" style="margin-bottom: 12px;">
          <h2 style="margin:0; font-size:1.05rem;">Últimos lançamentos</h2>
          <a href="financeiro.html" class="btn secondary small">Ver financeiro</a>
        </div>
        <div id="recent-transactions"><div class="empty-state">Carregando…</div></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
