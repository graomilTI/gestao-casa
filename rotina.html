<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotina familiar · Gestão de Casa</title>
  <meta name="theme-color" content="#0e1016" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gestão de Casa" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">🏡 Gestão de Casa</div>
      <div class="household-name" id="household-name">Carregando…</div>
      <nav id="sidebar-nav"></nav>
      <div class="spacer"></div>
      <button class="btn-logout" id="btn-logout">↪ Sair</button>
    </aside>

    <main class="main">
      <div class="page-header">
        <div>
          <h1>Rotina familiar</h1>
          <p>Organize as atividades do dia e marque o que já foi feito.</p>
        </div>
        <div class="row" style="flex:none; gap:10px; align-items:center;">
          <span class="badge normal" id="routine-date" style="align-self:center;"></span>
          <button class="btn" id="btn-new-activity">+ Nova atividade</button>
        </div>
      </div>

      <div class="routine-progress">
        <div class="bar"><span id="routine-progress-bar" style="width:0%"></span></div>
        <div class="label" id="routine-progress-label">0 de 0 concluídas hoje</div>
      </div>

      <div class="routine-list" id="routine-list"></div>
    </main>
  </div>

  <!-- Modal: nova/editar atividade -->
  <div class="modal-overlay hidden" id="modal-activity">
    <div class="modal">
      <h2 id="activity-modal-title">Nova atividade</h2>
      <div id="activity-modal-alert"></div>
      <form id="activity-form">
        <input type="hidden" id="activity-id" />
        <div class="form-group">
          <label for="activity-title">Título</label>
          <input type="text" id="activity-title" required placeholder="Ex.: Escovar os dentes" />
        </div>
        <div class="form-group">
          <label for="activity-description">Descrição</label>
          <textarea id="activity-description" placeholder="Opcional"></textarea>
        </div>
        <div class="row">
          <div class="form-group">
            <label for="activity-assigned">Responsável</label>
            <select id="activity-assigned">
              <option value="">Toda a família</option>
            </select>
          </div>
          <div class="form-group">
            <label for="activity-time">Horário</label>
            <input type="time" id="activity-time" />
          </div>
        </div>
        <div class="form-group">
          <label>Dias da semana</label>
          <div class="weekday-picker" id="activity-weekdays"></div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn danger hidden" id="btn-delete-activity">Excluir</button>
          <button type="button" class="btn secondary" id="btn-cancel-activity">Cancelar</button>
          <button type="submit" class="btn" id="btn-save-activity">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/rotina.js"></script>
</body>
</html>
